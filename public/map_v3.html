<html>
<head>
    <meta http-equiv="Content-Type" content="text/html; charset=utf-8" />
    <meta name="viewport" content="initial-scale=1.0, user-scalable=no" />
    <style>
        body, html, #map {
            width: 100%;
            height: 100%;
            overflow: hidden;
            margin: 0;
            padding: 0;
            font-family: "微软雅黑";
        }
    </style>
    <script type="text/javascript" src="http://api.map.baidu.com/api?v=3.0&ak=ccDFrydNGYnqtSD1OUR3HDmoAL3VH895"></script>
    <title>MapTile</title>
</head>
<body>
    <div id="map"></div>
</body>
</html>
<script type="text/javascript">
    var showRect = true;
    var nameFormat = "{x}_{y}";
    var ext = ".png";
    var host = window.location.origin;

    // 百度地图
    var map = new BMap.Map('map', { mapType: BMAP_HYBRID_MAP, minZoom: 10, maxZoom: 19 });
    map.centerAndZoom(new BMap.Point(119.138603157122, 37.7492061024646), 16);
    map.enableScrollWheelZoom();
    map.enableDoubleClickZoom();
    map.addControl(new BMap.ScaleControl({ anchor: BMAP_ANCHOR_TOP_LEFT }));
    map.addControl(new BMap.NavigationControl());
    map.addControl(new BMap.MapTypeControl({
        mapTypes: [
            BMAP_NORMAL_MAP,
            BMAP_SATELLITE_MAP,
            BMAP_HYBRID_MAP
        ]
    }));

    // 增加瓦片图层
    var tileLayer = new BMap.TileLayer();
    tileLayer.getTilesUrl = function(tileCoord, zoom) {
        var name = nameFormat
            .replace("{x}", tileCoord.x)
            .replace("{y}", tileCoord.y)
            .replace("{z}", zoom)
            ;
        return host + '/tiles/' + zoom + '/' + name + ext;
    }
    map.addTileLayer(tileLayer);

    // 增加矩形图层
    if (showRect) {
        var path1 = [
            new BMap.Point(118.972452569996, 37.8495683716678),
            new BMap.Point(119.304753744247, 37.8495683716678),
            new BMap.Point(119.304753744247, 37.6488438332614),
            new BMap.Point(118.972452569996, 37.6488438332614),
            new BMap.Point(118.972452569996, 37.8495683716678)
        ];
        var polyline = new BMap.Polyline(path1, { strokeColor: "blue", strokeWeight: 2, strokeOpacity: 0.5 });
        map.addOverlay(polyline);
    }
</script>
